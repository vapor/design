name: Build and deploy design.vapor.codes

on:
  push:
    branches:
    - main

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24
        cache: npm
    - name: Build site
      run: swift run && npm ci && npm run build
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6
      with:
        role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
        aws-region: ${{ vars.OIDC_ROLE_REGION }}
    - name: Deploy to AWS Cloudformation
      uses: aws-actions/aws-cloudformation-github-deploy@81e3b03d2266bcb76c4bcc37a7d71d9cb67838bb # v2
      env:
        AWS_REGION: eu-west-2
      with:
        name: vapor-design-stack
        template: stack.yml
        parameter-overrides: >-
          DomainName=design.vapor.codes,
          S3BucketName=vapor-design-site,
          AcmCertificateArn=${{ secrets.CERTIFICATE_ARN }}
    - name: Deploy to S3
      env:
        AWS_REGION: eu-west-2
      run: |
        aws s3 sync ./Output s3://vapor-design-site --no-progress --acl public-read
    - name: Invalidate CloudFront
      env:
        DISTRIBUTION_ID: ${{ secrets.VAPOR_DESIGN_DISTRIBUTION_ID }}
        AWS_REGION: eu-west-2
      run: |
        aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths '/*'
