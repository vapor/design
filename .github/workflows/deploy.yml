name: Build and deploy design.vapor.codes

on:
  push:
    branches:
    - main

jobs:
  build:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v7
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 26
        cache: npm
    - name: Build site
      # Kiln flow: webpack builds the CDN assets into ./Content first, then the
      # Kiln generator copies them (with the rendered HTML) into ./site.
      run: npm ci && npm run build && swift run DesignSite
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
      with:
        role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
        aws-region: ${{ vars.OIDC_ROLE_REGION }}
    - name: Deploy to AWS Cloudformation
      uses: aws-actions/aws-cloudformation-github-deploy@81e3b03d2266bcb76c4bcc37a7d71d9cb67838bb # v2.2.0
      env:
        AWS_REGION: eu-west-2
      with:
        name: vapor-design-stack
        template: stack.yml
        parameter-overrides: >-
          DomainName=design.vapor.codes,
          S3BucketName=vapor-design-site,
          AcmCertificateArn=${{ secrets.CERTIFICATE_ARN }}
    - name: Deploy to S3
      env:
        AWS_REGION: eu-west-2
      run: |
        aws s3 sync ./site s3://vapor-design-site --no-progress --acl public-read
    - name: Invalidate CloudFront
      env:
        DISTRIBUTION_ID: ${{ secrets.VAPOR_DESIGN_DISTRIBUTION_ID }}
        AWS_REGION: eu-west-2
      run: |
        aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths '/*'
