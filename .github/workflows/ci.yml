name: PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      deployments: write
      contents: read
    steps:
      - name: Create penny-bot token
        id: get-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PENNY_APP_ID }}
          private-key: ${{ secrets.PENNY_APP_PRIVATE_KEY }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.OIDC_ROLE_REGION }}
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ steps.get-token.outputs.token }}
      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 26
          cache: npm
      - name: Install Swift
        uses: vapor/swiftly-action@bedb227456c5f495afbef80baebee17a8a02cef4 # v0.2.1
        with:
          toolchain: latest
      - name: Set up CloudFormation Lint
        uses: ScottBrenner/cfn-lint-action@ed184e91f5085a2932501da8314e899e5e0ef5be # v2.7.1
      - name: Run CloudFormation Lint
        run: cfn-lint -t stack.yml
      - name: Install dependencies
        run: npm ci
      - name: Build CDN assets (webpack → ./Content)
        run: npm run build
      - name: Run Swift tests
        run: swift test
      - name: Generate the site (Kiln, ./Content → ./site)
        run: swift run DesignSite
      - name: Deploy S3 Website
        if: ${{ github.event.pull_request.head.repo.full_name == 'vapor/design' }}
        uses: brokenhandsio/s3-website-pr-action@6ebd9b622b4bb33358228571a50e05d375cbd4de # v3.1.0
        with:
          bucket-prefix: vapor-design-pulls
          folder-to-copy: "./site"
          bucket-region: us-east-1
          token: ${{ steps.get-token.outputs.token }}
