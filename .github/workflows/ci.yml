name: PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      deployments: write
      contents: read
    steps:
      - name: Create penny-bot token
        id: get-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PENNY_APP_ID }}
          private-key: ${{ secrets.PENNY_APP_PRIVATE_KEY }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.OIDC_ROLE_REGION }}
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.get-token.outputs.token }}
      - name: Set up Node 
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Set up CloudFormation Lint
        uses: ScottBrenner/cfn-lint-action@v2
      - name: Run CloudFormation Lint
        run: cfn-lint -t stack.yml
      - name: Build Publish website
        run: swift run
      - name: Install dependencies
        run: npm ci
      - name: Build Node website
        run: npm run build
      - name: Deploy S3 Website
        if: ${{ github.event.pull_request.head.repo.full_name == 'vapor/design' && github.actor != 'dependabot[bot]' }}
        uses: brokenhandsio/s3-website-pr-action@v2
        env:
          GITHUB_TOKEN: ${{ steps.get-token.outputs.token }}
        with:
          bucket-prefix: "vapor-design-pulls"
          folder-to-copy: "./Output"
          bucket-region: "us-east-1"
