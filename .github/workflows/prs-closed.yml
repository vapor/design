name: PR - Closed

on:
  pull_request:
    branches:
      - main
    types: [closed]

jobs:
  delete-s3:
    name: Delete S3 Website
    runs-on: ubuntu-latest
    permissions:
      deployments: write
      id-token: write
      contents: read
    if: ${{ github.event.pull_request.head.repo.full_name == 'vapor/design' }}
    steps:
      - name: Create penny-bot token
        id: get-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PENNY_APP_ID }}
          private-key: ${{ secrets.PENNY_APP_PRIVATE_KEY }}
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
          aws-region: ${{ vars.OIDC_ROLE_REGION }}
      - name: Delete Website Bucket
        uses: brokenhandsio/s3-website-pr-action@v3
        with:
          bucket-prefix: "vapor-design-pulls"
          bucket-region: "us-east-1"
          token: ${{ steps.get-token.outputs.token }}
